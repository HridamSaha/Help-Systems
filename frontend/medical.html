<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Emergency – Help Systems</title>
  <meta name="description"
    content="Submit an anonymous medical emergency help request. Voice input in any Indian language supported.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/franc-min@6/index.min.js"></script>

  <style>
    /* Page-specific overrides */
    .form-hero {
      text-align: center;
      padding: 40px 0 28px;
    }

    .form-hero .hero-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 26px rgba(239, 68, 68, 0.35);
    }

    .form-hero h2 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #ef4444;
    }

    .form-hero p {
      font-size: 14px;
      color: var(--text-2);
      margin-top: 6px;
    }

    .form-card {
      background: var(--bg-card);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 32px;
      box-shadow: 0 10px 40px rgba(239, 68, 68, 0.1);
    }

    .map-wrap {
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border-soft);
      margin-top: 10px;
    }

    #map {
      height: 240px;
    }

    /* Submit area */
    .submit-area {
      margin-top: 24px;
    }

    .btn-medical {
      background: linear-gradient(135deg, #ef4444, #b91c1c) !important;
      color: #fff;
    }

    .btn-medical:hover {
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4) !important;
      transform: translateY(-2px);
    }

    .sos-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
      margin-top: 12px;
    }

    .sos-hint a {
      color: #f87171;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <nav class="topbar">
    <a class="topbar-brand" href="index.html">
      <div class="brand-icon">🛡️</div>
      <h1>Help <span>Systems</span></h1>
    </a>
    <div class="topbar-nav">
      <a href="index.html">Submit</a>
      <a href="medical.html" class="active" style="color: #ef4444;">Medical</a>
      <a href="track.html">Track</a>
      <a href="admin.html">Admin</a>
      <a href="medical-admin.html">Medical Admin</a>
      <a href="police.html">Police</a>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="page-wrap" style="max-width:600px;">

    <div class="form-hero">
      <div class="hero-icon">🏥</div>
      <h2>Medical Emergency</h2>
      <p>Need urgent medical assistance? Your request will instantly bypass dispatch and alert the medical team
        directly.</p>
    </div>

    <div class="form-card">
      <form onsubmit="submitRequest(event)">

        <!-- Message -->
        <div class="form-group">
          <label>Describe the Emergency</label>
          <textarea id="message" rows="3" placeholder="Condition of the patient, injuries, required aids…"
            required></textarea>
        </div>

        <!-- Voice -->
        <div class="form-group">
          <label>Voice Input <small>(auto-detects language)</small></label>
          <button type="button" class="btn btn-voice" id="voiceBtn" onclick="startVoice()">
            🎤 Speak details via Voice
          </button>
          <span id="langDetectedBadge">🌐 Auto-Detected</span>
          <div id="voiceStatus"></div>
        </div>

        <!-- Language -->
        <div class="form-group" style="display:none;">
          <select id="language">
            <option value="en-IN">English</option>
            <option value="hi-IN">Hindi</option>
            <option value="ta-IN">Tamil</option>
            <option value="te-IN">Telugu</option>
            <option value="bn-IN">Bengali</option>
            <option value="ml-IN">Malayalam</option>
            <option value="kn-IN">Kannada</option>
            <option value="mr-IN">Marathi</option>
            <option value="gu-IN">Gujarati</option>
            <option value="pa-IN">Punjabi</option>
            <option value="ur-IN">Urdu</option>
          </select>
        </div>

        <!-- Location -->
        <div class="form-group">
          <label>Location Area</label>
          <button type="button" class="btn btn-location" onclick="getLocation()" style="margin-bottom:10px;">
            📍 Detect My Location
          </button>
          <input type="text" id="locationArea" placeholder="Location will appear here…" readonly>
          <input type="hidden" id="lat">
          <input type="hidden" id="lon">
          <div class="map-wrap">
            <div id="map"></div>
          </div>
        </div>

        <!-- Submit -->
        <div class="submit-area">
          <button type="submit" class="btn btn-primary btn-medical" id="submitBtn">
            🚑 Dispatch Ambulance
          </button>
          <p class="sos-hint">
            Already submitted? <a href="track.html">Track your request →</a>
          </p>
        </div>

      </form>
    </div>

    <h3 id="response"></h3>

  </div>

  <script>
    // ── Map ──────────────────────────────────────────────────────────────────────
    let map, marker;
    function initMap(lat = 20.5937, lon = 78.9629) {
      map = L.map('map', { zoomControl: true }).setView([lat, lon], 5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);
    }

    function getLocation() {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          document.getElementById('lat').value = lat;
          document.getElementById('lon').value = lon;
          map.setView([lat, lon], 15);
          if (marker) marker.setLatLng([lat, lon]);
          else marker = L.marker([lat, lon]).addTo(map).bindPopup('📍 Your Location').openPopup();
          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(r => r.json())
            .then(d => { document.getElementById('locationArea').value = d.display_name; })
            .catch(() => { document.getElementById('locationArea').value = lat + ', ' + lon; });
        },
        () => alert('Location access denied. Please allow location in your browser.')
      );
    }

    // ── Language detection map ───────────────────────────────────────────────────
    const LANG_MAP = {
      'eng': { code: 'en-IN', name: 'English' },
      'hin': { code: 'hi-IN', name: 'Hindi' },
      'tam': { code: 'ta-IN', name: 'Tamil' },
      'tel': { code: 'te-IN', name: 'Telugu' },
      'ben': { code: 'bn-IN', name: 'Bengali' },
      'mal': { code: 'ml-IN', name: 'Malayalam' },
      'kan': { code: 'kn-IN', name: 'Kannada' },
      'mar': { code: 'mr-IN', name: 'Marathi' },
      'guj': { code: 'gu-IN', name: 'Gujarati' },
      'pan': { code: 'pa-IN', name: 'Punjabi' },
      'urd': { code: 'ur-IN', name: 'Urdu' }
    };

    let isListening = false;

    function setVoiceStatus(msg, color) {
      const el = document.getElementById('voiceStatus');
      el.style.color = color || 'var(--text-3)';
      el.innerText = msg;
    }

    function startVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice recognition requires Google Chrome.');
        return;
      }
      if (isListening) return;

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const btn = document.getElementById('voiceBtn');
      const badge = document.getElementById('langDetectedBadge');

      const rec = new SR();
      rec.lang = 'hi-IN';
      rec.interimResults = false;
      rec.maxAlternatives = 3;

      isListening = true;
      btn.classList.add('listening');
      btn.innerText = '🔴 Listening… Speak now';
      badge.style.display = 'none';
      setVoiceStatus('🎙️ Speak in any language…', '#f87171');

      rec.onresult = e => {
        const transcript = e.results[0][0].transcript.trim();
        let detectedLang = null, detectedName = null;

        if (typeof franc !== 'undefined' && transcript.length > 2) {
          const iso = franc(transcript, { minLength: 2 });
          if (iso && LANG_MAP[iso]) {
            detectedLang = LANG_MAP[iso].code;
            detectedName = LANG_MAP[iso].name;
          }
        }

        if (detectedLang && detectedLang !== 'hi-IN' && detectedLang !== 'en-IN') {
          const rec2 = new SR();
          rec2.lang = detectedLang;
          rec2.interimResults = false;
          setVoiceStatus(`🔍 Detected ${detectedName}! Speak once more for best accuracy…`, '#a78bfa');
          rec2.onresult = e2 => populateMessage(e2.results[0][0].transcript.trim(), detectedLang, detectedName);
          rec2.onerror = () => populateMessage(transcript, detectedLang, detectedName);
          rec2.onend = () => { isListening = false; btn.classList.remove('listening'); btn.innerText = '🎤 Speak details via Voice'; };
          rec2.start();
        } else {
          populateMessage(transcript, detectedLang || 'en-IN', detectedName || 'English');
          isListening = false;
          btn.classList.remove('listening');
          btn.innerText = '🎤 Speak details via Voice';
        }
      };

      rec.onerror = () => {
        isListening = false;
        btn.classList.remove('listening');
        btn.innerText = '🎤 Speak details via Voice';
        setVoiceStatus('❌ Could not hear. Please try again.', '#f87171');
      };
      rec.onend = () => {
        if (isListening) {
          isListening = false;
          btn.classList.remove('listening');
          btn.innerText = '🎤 Speak details via Voice';
        }
      };
      rec.start();
    }

    function populateMessage(text, langCode, langName) {
      document.getElementById('message').value = text;
      const sel = document.getElementById('language');
      for (let i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === langCode) { sel.selectedIndex = i; break; }
      }
      const badge = document.getElementById('langDetectedBadge');
      badge.style.display = 'inline';
      badge.innerText = `🌐 ${langName} Detected`;
      setVoiceStatus(`✅ Message captured in ${langName}. Edit if needed.`, '#34d399');
    }

    // ── Submit ───────────────────────────────────────────────────────────────────
    async function submitRequest(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = '⏳ Dispatching…';
      btn.disabled = true;

      const data = {
        issueType: 'MEDICAL',
        message: document.getElementById('message').value,
        language: document.getElementById('language').value,
        locationArea: document.getElementById('locationArea').value,
        latitude: parseFloat(document.getElementById('lat').value) || 0.0,
        longitude: parseFloat(document.getElementById('lon').value) || 0.0
      };

      try {
        const res = await fetch('http://localhost:8080/api/help/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        const rid = result.requestId;

        const respEl = document.getElementById('response');
        respEl.innerHTML = `
          <span style="color:#ef4444;font-size:15px;font-weight:700;display:block;margin-bottom:4px;">🚨 Medical Emergency Dispatched!</span>
          <span style="color:#fca5a5;font-size:13px;font-weight:700;">🚑 An ambulance is being assigned — tracking will update shortly.</span>
          <span style="color:var(--text-3);font-size:12px;display:block;margin-top:4px;">Request ID: ${rid}</span>
        `;

        setTimeout(() => { window.location.href = `track.html?requestId=${rid}`; }, 2500);
      } catch {
        document.getElementById('response').style.color = '#f87171';
        document.getElementById('response').innerText = '⚠️ Connection error. Is the server running?';
        btn.innerText = '🚑 Dispatch Ambulance';
        btn.disabled = false;
      }
    }

    // ── Init ─────────────────────────────────────────────────────────────────────
    window.onload = () => initMap();
  </script>

</body>

</html>
